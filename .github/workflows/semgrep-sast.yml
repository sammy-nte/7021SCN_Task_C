name: SAST Security Pipeline
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-semgrep-
      - name: Install Semgrep
        run: pip install semgrep
      - name: Semgrep Cloud Scan
        run: semgrep ci
      - name: Semgrep OWASP Scan — JSON Report
        if: always()
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/flask \
            --config custom-rules.yaml \
            --metrics=off \
            --error \
            --json \
            --output semgrep-report.json \
            .
      - name: Semgrep OWASP Scan — SARIF Report
        if: always()
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/flask \
            --config custom-rules.yaml \
            --metrics=off \
            --sarif \
            --output semgrep-results.sarif \
            --exclude semgrep-report.json \
            .
      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
      - name: Upload JSON Report as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-audit-report
          path: semgrep-report.json
          retention-days: 30